server:
  port: 8080

spring:
  config:
    import: optional:file:./config/application-local.yml
  application:
    name: ai-content-marketing-backend
  datasource:
    url: jdbc:mysql://localhost:3306/ai_content_marketing?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: ai-content-marketing-system-dev-secret-please-change
  expiration: 604800000
