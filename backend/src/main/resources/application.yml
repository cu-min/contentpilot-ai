server:
  port: 8080

spring:
  # 仅用于开发机的数据库等本地配置；该文件被 .gitignore 忽略，不会进入仓库。
  config:
    import: optional:file:./config/application-local.yml
  application:
    name: ai-content-marketing-backend
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ai_content_marketing}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: ${JWT_SECRET:}
  expiration: 604800000
