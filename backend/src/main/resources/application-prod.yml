spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:ai_content_marketing}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  sql:
    init:
      mode: never

jwt:
  secret: ${JWT_SECRET}

platform:
  credentials:
    key: ${PLATFORM_CREDENTIAL_KEY}
    required: true

browser:
  profile:
    allowed-root: /app/browser-data
