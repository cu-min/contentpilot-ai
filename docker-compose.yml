services:
  mysql:
    image: mysql:8.0
    container_name: ai-content-marketing-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ai_content_marketing}
      MYSQL_USER: ${MYSQL_USER:-ai_marketing}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      TZ: ${TZ:-Asia/Shanghai}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/src/main/resources/data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    expose:
      - "3306"
    ports:
      - "127.0.0.1:13306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ai-content-marketing-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-ai_content_marketing}
      DB_USERNAME: ${DB_USERNAME:-ai_marketing}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_API_URL: ${DEEPSEEK_API_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      EXA_API_KEY: ${EXA_API_KEY}
      EXA_BASE_URL: ${EXA_BASE_URL:-https://api.exa.ai}
      EXA_TIMEOUT_SECONDS: ${EXA_TIMEOUT_SECONDS:-15}
      PLAYWRIGHT_HEADLESS: "false"
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      DISPLAY: :99
      TZ: ${TZ:-Asia/Shanghai}
      VNC_PASSWORD: ${VNC_PASSWORD:?VNC_PASSWORD is required}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      PLATFORM_CREDENTIAL_KEY: ${PLATFORM_CREDENTIAL_KEY:?PLATFORM_CREDENTIAL_KEY is required}
    volumes:
      - backend-logs:/app/logs
      - playwright-browser-data:/app/browser-data
      - csdn-browser-profile:/app/browser-data/csdn
      - zhihu-browser-profile:/app/browser-data/zhihu
    expose:
      - "8080"
      - "5900"
    ports:
      - "127.0.0.1:${NOVNC_PORT:-6080}:6080"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ai-content-marketing-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql-data:
  backend-logs:
  playwright-browser-data:
  csdn-browser-profile:
  zhihu-browser-profile:
