schema: spec-driven

context: |
  ContentPilot AI 是内部内容营销平台。
  后端使用 Java 17、Spring Boot、MyBatis-Plus、MySQL；前端使用 React 18、
  TypeScript、Vite、Ant Design、MobX。
  开始任务前必须阅读 AGENTS.md，其中定义了 Agent 职责、Worktree 边界、验证和安全规则。
  长期 API 与状态机契约位于 docs/contracts/。不得静默修改契约；如受影响，必须在
  OpenSpec 的设计文档中链接并说明影响。
  发布边界严格：集成只能准备草稿或填充编辑器，绝不自动执行最终发布、不绕过登录或验证码，
  也不声称已验证正式发布结果。
  验证命令：scripts/verify-backend.sh、scripts/verify-frontend.sh、
  scripts/verify-changed.sh、scripts/verify-all.sh。

rules:
  proposal:
    - 使用中文，包含目标、范围、不做事项和验收检查。
    - 标明 API、数据库、安全、外部平台或状态机影响。
  specs:
    - 使用中文，以给定/当/则场景描述可观察行为。
    - 规格不写实现细节。
  design:
    - 前后端契约受影响时，链接 docs/contracts/ 中的对应文件。
    - 写明共享文件负责人，以及必要的迁移或回滚方案。
  tasks:
    - 前端、后端和 QA 可以独立推进时应拆分任务。
    - 每个实现任务都要写对应的验证命令。
